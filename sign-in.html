<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In || Learnify</title>
    <link rel="html" type="text/html" href="success.html" />
    <link rel="html" type="text/html" href="error.html" />
    <link rel="stylesheet" type="text/css" href="./style/style2.css" />
    <script
      src="https://kit.fontawesome.com/97c6552ba7.js"
      crossorigin="anonymous"
    ></script>
</head>
  <body>
    <button class="back-button" type="button" onclick="window.location.href = 'index.html'">
      <i class="fa-solid fa-arrow-left"></i> Back to Home
    </button>
    <div class="form-container">
      <form action="success.html" method="post">
        <h1>Sign In</h1>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required />
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required />
        <button type="submit">
          Sign In
          <i class="fa-solid fa-arrow-right-to-bracket"></i>
        </button>

        <!-- <a href="/error.html"><button type="button">Error</button></a> -->
      </form>
    </div>
  </body>
</html>
